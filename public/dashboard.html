<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Manage your wishlists — create, edit, share, and track item reservations.">
  <title>My Wishlists — Digital Wishlist Platform</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/js/common.js"></script>
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="ambient-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">
        <div class="brand-icon"><i data-lucide="gift"></i></div>
        <span>Wishlist</span>
      </a>
      <div class="navbar-actions">
        <button class="btn btn-icon theme-toggle-btn" aria-label="Toggle Theme" onclick="toggleTheme()" style="background:transparent; border:none; color:var(--text-primary); cursor:pointer;">
          <i data-lucide="sun" class="icon-sun"></i>
          <i data-lucide="moon" class="icon-moon hidden"></i>
        </button>
        <span class="navbar-user" id="user-name-display"></span>
        <button class="btn btn-secondary btn-sm" onclick="logout()">Log Out</button>
      </div>
    </div>
  </nav>

  <div class="container animate-fade-in-up" style="margin-top: 40px;">
    <!-- Wishlist Analytics Section -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-label">Total Value</div>
        <div class="stat-value" id="stats-total-value">₹0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🎁</div>
        <div class="stat-label">Items Count</div>
        <div class="stat-value" id="stats-total-items">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔒</div>
        <div class="stat-label">Reserved</div>
        <div class="stat-value" id="stats-total-reserved">0</div>
      </div>
    </div>

    <!-- Dashboard Header -->
    <div class="dashboard-header">
      <div>
        <h1>My <span class="gradient-text">Wishlists</span></h1>
      </div>
      <div style="display:flex; gap:12px; align-items:center;">
        <div class="dashboard-stats">
          <span class="stat-badge"><strong id="stats-lists">0</strong> Lists</span>
        </div>
        <button class="btn btn-primary" id="create-wishlist-btn" onclick="openCreateWishlistModal()">+ New Wishlist</button>
      </div>
    </div>

    <!-- Wishlists Grid -->
    <div class="wishlists-grid" id="wishlists-grid">
      <!-- Dynamically populated -->
    </div>

    <!-- Empty State -->
    <div class="empty-state hidden" id="empty-state">
      <div class="empty-state-icon">📋</div>
      <h3>No wishlists yet</h3>
      <p class="text-muted">Create your first wishlist to get started!</p>
      <button class="btn btn-primary" onclick="openCreateWishlistModal()" style="margin-top:16px;">+ Create Wishlist</button>
    </div>
  </div>

  <!-- Create/Edit Wishlist Modal -->
  <div class="modal-overlay" id="wishlist-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="wishlist-modal-title">New Wishlist</h2>
        <button class="modal-close" onclick="closeModal('wishlist-modal')">✕</button>
      </div>
      <form onsubmit="handleWishlistSubmit(event)">
        <input type="hidden" id="wishlist-edit-id">
        <div class="form-group">
          <label for="wishlist-title">Title</label>
          <input type="text" class="form-control" id="wishlist-title" placeholder="e.g. Birthday 2026" required maxlength="100">
        </div>
        <div class="form-group">
          <label for="wishlist-description">Description</label>
          <textarea class="form-control" id="wishlist-description" placeholder="What's this list for?" maxlength="500"></textarea>
        </div>
        <div class="form-group">
          <div class="toggle-wrapper">
            <label class="toggle">
              <input type="checkbox" id="wishlist-public">
              <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label">Make Public (shareable)</span>
          </div>
        </div>
        <div class="form-actions" style="display:flex; gap:12px; margin-top:24px;">
          <button type="submit" class="btn btn-primary" style="flex:2;" id="wishlist-submit-btn">Save Wishlist</button>
          <button type="button" class="btn btn-secondary" style="flex:1;" onclick="closeModal('wishlist-modal')">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/js/wishlist.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
