<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View a shared wishlist and reserve items as a guest — no account needed.">
  <title>Shared Wishlist — Digital Wishlist Platform</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/js/common.js"></script>
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="ambient-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">
        <div class="brand-icon"><i data-lucide="gift"></i></div>
        <span>Wishlist</span>
      </a>
      <div class="navbar-actions">
        <button class="btn btn-icon theme-toggle-btn" aria-label="Toggle Theme" onclick="toggleTheme()" style="background:transparent; border:none; color:var(--text-primary); cursor:pointer;">
          <i data-lucide="sun" class="icon-sun"></i>
          <i data-lucide="moon" class="icon-moon hidden"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="container animate-fade-in-up">
    <!-- Wishlist Analytics Section (For Guests) -->
    <div class="stats-grid" style="margin-top: 40px;">
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-label">Wishlist Value</div>
        <div class="stat-value" id="stats-share-value">₹0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🎁</div>
        <div class="stat-label">Total Items</div>
        <div class="stat-value" id="stats-share-count">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔒</div>
        <div class="stat-label">Reserved</div>
        <div class="stat-value" id="stats-share-reserved">0</div>
      </div>
    </div>

    <!-- Loading -->
    <div class="page-loader" id="share-loader">
      <div class="spinner"></div>
    </div>

    <!-- Error State -->
    <div class="empty-state hidden" id="share-error">
      <div class="empty-state-icon">🔒</div>
      <h3 id="share-error-title">Wishlist Not Found</h3>
      <p id="share-error-msg">This wishlist may be private or the link is invalid.</p>
      <a href="/" class="btn btn-primary">Go Home</a>
    </div>

    <!-- Wishlist Content -->
    <div class="hidden" id="share-content">
      <div class="share-hero">
        <h1 id="share-title">Wishlist Title</h1>
        <p id="share-description">Wishlist description</p>
        <p style="margin-top:8px; font-size:0.9rem;">Shared by <span class="share-owner" id="share-owner">User</span></p>
      </div>

      <div class="items-list" id="share-items-list">
        <!-- Dynamically populated -->
      </div>

      <div class="empty-state hidden" id="share-items-empty" style="padding:40px;">
        <div class="empty-state-icon">📭</div>
        <h3>No items in this wishlist</h3>
        <p>The owner hasn't added any items yet.</p>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Mobile Navigation (Guest View) -->
  <nav class="mobile-nav">
    <a href="/" class="mobile-nav-item">
      <i data-lucide="home"></i>
      <span>Home</span>
    </a>
    <a href="/login.html" class="mobile-nav-item">
      <div class="nav-fab" style="margin-top: -30px;">
        <i data-lucide="sparkles"></i>
      </div>
      <span>Join Now</span>
    </a>
    <button class="mobile-nav-item" onclick="toggleTheme()" style="background:none; border:none;">
      <i data-lucide="sun"></i>
      <span>Theme</span>
    </button>
  </nav>

  <script src="/js/share.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
